<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elon Green Box Pickup</title>
  <style>
    :root {
      --maroon: #73000a;
      --green: #2f8f5b;
      --cream: #f7f3ee;
      --text: #1f1f1f;
      --muted: #666;
      --border: #e7ddd0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #fff 0%, var(--cream) 100%);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid rgba(115, 0, 10, 0.08);
      padding: 16px 0;
    }
    .topbar-inner {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand strong { color: var(--maroon); font-size: 1rem; }
    .nav { display: flex; gap: 10px; }
    .nav a {
      color: var(--maroon);
      font-weight: 700;
      font-size: 0.93rem;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      background: transparent;
      border: 0;
    }
    .nav a:hover, .nav a.active { background: rgba(115, 0, 10, 0.08); }
    .hero {
      color: #fff;
      background: linear-gradient(135deg, var(--maroon) 0%, #860915 60%);
      padding: 80px 0;
      text-align: center;
    }
    .hero h1 { margin: 0; font-size: 3rem; }
    .hero p { margin: 20px auto 0; max-width: 600px; font-size: 1.1rem; }
    main {
      width: min(1120px, calc(100% - 28px));
      margin: 50px auto;
    }
    .hidden { display: none !important; }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(34, 18, 8, 0.08);
      padding: 32px;
    }
    .card h2 { margin: 0 0 16px; color: var(--maroon); }
    .card p { margin: 0 0 24px; color: var(--muted); line-height: 1.6; }
    form { display: grid; gap: 16px; margin: 20px 0; }
    label { display: grid; gap: 8px; font-weight: 700; font-size: 0.95rem; }
    input, textarea, select {
      width: 100%;
      padding: 12px 13px;
      border-radius: 13px;
      border: 1px solid #d7cebf;
      background: #fff;
      font: inherit;
      font-size: 0.98rem;
    }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid rgba(47, 143, 91, 0.18);
      border-color: var(--green);
    }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button {
      background: var(--green);
      color: #fff;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-weight: 800;
      cursor: pointer;
      font-size: 0.97rem;
    }
    button:hover { transform: translateY(-1px); }
    .btn-small {
      padding: 8px 12px;
      font-size: 0.85rem;
      background: var(--maroon);
      margin-top: 10px;
      width: auto;
    }
    textarea { min-height: 100px; resize: vertical; }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0 18px; }
    .tab {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #faf8f4;
      color: var(--maroon);
      font-weight: 800;
      cursor: pointer;
    }
    .tab.active { background: var(--maroon); color: #fff; border-color: var(--maroon); }
    .panel { display: none; }
    .panel.active { display: block; }
    .request-card {
      border: 1px solid #e8dfd3;
      border-radius: 18px;
      padding: 18px;
      background: #fffdfa;
      margin-bottom: 12px;
      transition: opacity 0.3s ease;
    }
    .request-card.completed {
      opacity: 0.5;
      background: #f5f5f5;
    }
    .request-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .request-title { font-weight: 800; color: var(--maroon); font-size: 1.05rem; }
    .request-meta { display: grid; gap: 8px; color: var(--muted); font-size: 0.93rem; line-height: 1.5; }
    .success { padding: 16px; background: #f2fbf5; border: 1px solid #d8ebdd; border-radius: 18px; color: #18603b; margin: 16px 0; }
    .status { display: inline-block; padding: 6px 10px; border-radius: 999px; font-size: 0.8rem; font-weight: 700; background: #f8edd0; color: #8b6600; }
    .status.completed { background: #dff1e5; color: #18603b; }
    .help { color: #696969; font-size: 0.88rem; line-height: 1.55; margin-top: 12px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <strong>Green Box Pickup</strong>
      </div>
      <nav class="nav">
        <a onclick="switchTab('form')" id="nav-form" class="active">Submit Request</a>
        <a onclick="switchTab('dasher')" id="nav-dasher">Dasher Board</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <h1>Tell us where your Green Box is</h1>
    <p>We'll come pick it up and get it back into circulation</p>
  </section>

  <main id="form-section" class="form-section">
    <div class="card">
      <h2>Submit a Pickup Request</h2>
      <p>Fill out the form and we'll schedule a pickup at your location.</p>

      <form id="pickup-form">
        <label>
          Name
          <input id="name" type="text" placeholder="Your full name" required>
        </label>

        <div class="split">
          <label>
            Building / Dorm
            <select id="building" required>
              <option value="" selected disabled>Select location</option>
              <option>Global Commons</option>
              <option>Colonnades</option>
              <option>East Neighborhood</option>
              <option>Danieley Center</option>
              <option>Loy Center</option>
              <option>Station at Mill Point</option>
              <option>Other</option>
            </select>
          </label>
          <label>
            Room Number
            <input id="room" type="text" placeholder="e.g., 218" required>
          </label>
        </div>

        <label>
          Phone Number
          <input id="phone" type="tel" placeholder="(###) ###-####" required>
        </label>

          Notes*
