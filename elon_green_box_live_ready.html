<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Box Form</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Green Box Request Form</h1>
        <form id="greenBoxForm" action="https://ixeybxsgrutymfquqqsa.functions.supabase.co/submit" method="POST">
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" name="first_name" required>

            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name" required>

            <label for="student_id">Student ID:</label>
            <input type="text" id="student_id" name="student_id" required>

            <label for="building">Building:</label>
            <input type="text" id="building" name="building" required>

            <label for="room">Room:</label>
            <input type="text" id="room" name="room" required>

            <label for="contact">Contact:</label>
            <input type="text" id="contact" name="contact" required>

            <label for="boxes">Number of Boxes:</label>
            <input type="number" id="boxes" name="boxes" required>

            <label for="notes">Notes:</label>
            <textarea id="notes" name="notes"></textarea>

            <button type="submit">Submit Request</button>
        </form>
    </div>
    <script>
        // Tab functionality for Student Request and Runner Dashboard
        document.getElementById('studentRequestTab').onclick = function () {
            document.getElementById('greenBoxForm').style.display = 'block';
            document.getElementById('runnerDashboard').style.display = 'none';
        };
        document.getElementById('runnerDashboardTab').onclick = function () {
            document.getElementById('greenBoxForm').style.display = 'none';
            document.getElementById('runnerDashboard').style.display = 'block';
        };
    </script>
</body>
</html>
