<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elon Green Box Pickup</title>
  <style>
    :root { --maroon: #73000a; --green: #2f8f5b; --cream: #f7f3ee; --text: #1f1f1f; --muted: #666; --border: #e7ddd0; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; color: var(--text); background: linear-gradient(180deg, #fff 0%, var(--cream) 100%); }
    .topbar { position: sticky; top: 0; z-index: 20; background: rgba(255,255,255,0.95); border-bottom: 1px solid rgba(115,0,10,0.08); padding: 16px 0; }
    .topbar-inner { width: min(1120px, calc(100% - 28px)); margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .brand strong { color: var(--maroon); font-size: 1rem; }
    .nav { display: flex; gap: 10px; }
    .nav a { color: var(--maroon); font-weight: 700; font-size: 0.93rem; padding: 10px 12px; border-radius: 10px; cursor: pointer; background: transparent; border: 0; }
    .nav a:hover, .nav a.active { background: rgba(115,0,10,0.08); }
    .hero { color: #fff; background: linear-gradient(135deg, var(--maroon) 0%, #860915 60%); padding: 80px 0; text-align: center; }
    .hero h1 { margin: 0; font-size: 3rem; }
    .hero p { margin: 20px auto 0; max-width: 600px; font-size: 1.1rem; }
    main { width: min(1120px, calc(100% - 28px)); margin: 50px auto; }
    .hidden { display: none !important; }
    .card { background: #fff; border: 1px solid var(--border); border-radius: 24px; box-shadow: 0 18px 40px rgba(34,18,8,0.08); padding: 32px; }
    .card h2 { margin: 0 0 16px; color: var(--maroon); }
    .card p { margin: 0 0 24px; color: var(--muted); }
    form { display: grid; gap: 16px; margin: 20px 0; }
    label { display: grid; gap: 8px; font-weight: 700; }
    input, textarea, select { width: 100%; padding: 12px 13px; border-radius: 13px; border: 1px solid #d7cebf; background: #fff; font: inherit; }
    input:focus, textarea:focus, select:focus { outline: 2px solid rgba(47,143,91,0.18); border-color: var(--green); }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button { background: var(--green); color: #fff; border: 0; border-radius: 14px; padding: 14px 18px; font-weight: 800; cursor: pointer; }
    button:hover { transform: translateY(-1px); }
    .btn-complete { padding: 8px 12px; font-size: 0.85rem; background: var(--maroon); margin-top: 10px; width: auto; }
    textarea { min-height: 100px; resize: vertical; }
    .request-card { border: 1px solid #e8dfd3; border-radius: 18px; padding: 18px; background: #fffdfa; margin-bottom: 12px; }
    .request-card.done { opacity: 0.5; background: #f5f5f5; }
    .request-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .request-title { font-weight: 800; color: var(--maroon); }
    .request-meta { display: grid; gap: 8px; color: var(--muted); font-size: 0.93rem; }
    .status { display: inline-block; padding: 6px 10px; border-radius: 999px; font-size: 0.8rem; font-weight: 700; background: #f8edd0; color: #8b6600; }
    .status.done { background: #dff1e5; color: #18603b; }
    .success { padding: 16px; background: #f2fbf5; border: 1px solid #d8ebdd; border-radius: 18px; color: #18603b; margin: 16px 0; }
    .error { padding: 16px; background: #ffe8e8; border: 1px solid #ffcccc; border-radius: 18px; color: #c0392b; margin: 16px 0; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand"><strong>Green Box Pickup</strong></div>
      <nav class="nav">
        <a onclick="switchTab('form')" id="nav-form" class="active">Submit Request</a>
        <a onclick="askPassword()" id="nav-dasher">Dasher Board</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <h1>Tell us where your Green Box is</h1>
    <p>We'll come pick it up and get it back into circulation</p>
  </section>

  <main id="form-section">
    <div class="card">
      <h2>Submit a Pickup Request</h2>
      <p>Fill out the form below.</p>
      <form id="pickup-form">
        <label>Name<input id="name" type="text" placeholder="Your full name" required></label>
        <div class="split">
          <label>Building<select id="building" required>
            <option value="">Select location</option>
            <option>Global Commons</option>
            <option>Colonnades</option>
            <option>East Neighborhood</option>
            <option>Danieley Center</option>
            <option>Loy Center</option>
            <option>Station at Mill Point</option>
            <option>Other</option>
          </select></label>
          <label>Room<input id="room" type="text" placeholder="218" required></label>
        </div>
        <label>Phone<input id="phone" type="tel" placeholder="(336) 555-0000" required></label>
        <label>Notes<textarea id="notes" placeholder="Leave outside, text when here, etc."></textarea></label>
        <button type="submit">Submit Request</button>
      </form>
      <div id="success-msg" class="success hidden">Request submitted!</div>
    </div>
  </main>

  <main id="dasher-section" class="hidden">
    <div class="card">
      <h2>Live Pickup Requests</h2>
      <div id="requests-list"></div>
    </div>
  </main>

  <script>
    let requests = JSON.parse(localStorage.getItem('greenbox-requests')) || [];
    let dasherUnlocked = false;

    function askPassword() {
      const password = prompt('Enter Dasher Board password:');
      if (password === 'GreenBox') {
        dasherUnlocked = true;
        switchTab('dasher');
      } else if (password !== null) {
        alert('Incorrect password');
      }
    }

    function switchTab(tab) {
      if (tab === 'dasher' && !dasherUnlocked) {
        askPassword();
        return;
      }
      document.getElementById('form-section').classList.toggle('hidden', tab !== 'form');
      document.getElementById('dasher-section').classList.toggle('hidden', tab !== 'dasher');
      document.getElementById('nav-form').classList.toggle('active', tab === 'form');
      if (tab === 'dasher') refreshDasher();
    }

    function toggleComplete(id) {
      const req = requests.find(r => r.id === id);
      if (req) {
        req.completed = !req.completed;
        localStorage.setItem('greenbox-requests', JSON.stringify(requests));
        refreshDasher();
      }
    }

    document.getElementById('pickup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const building = document.getElementById('building').value;
      const room = document.getElementById('room').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const notes = document.getElementById('notes').value.trim();

      if (!name || !building || !room || !phone) {
        alert('Fill out all fields');
        return;
      }

      const request = {
        id: Date.now(),
        name, building, room, phone, notes,
        completed: false,
        created_at: new Date().toLocaleString()
      };

      requests.unshift(request);
      localStorage.setItem('greenbox-requests', JSON.stringify(requests));
      document.getElementById('success-msg').classList.remove('hidden');
      this.reset();
      setTimeout(() => { document.getElementById('success-msg').classList.add('hidden'); }, 2000);
    });

    function refreshDasher() {
      const html = requests.length > 0 
        ? requests.map(r => `<div class="request-card ${r.completed ? 'done' : ''}">
            <div class="request-header">
              <div class="request-title">${r.building}, Room ${r.room}</div>
              <div class="status ${r.completed ? 'done' : ''}">${r.completed ? '✓ Done' : 'Pending'}</div>
            </div>
            <div class="request-meta">
              <div><strong>Name:</strong> ${r.name}</div>
              <div><strong>Phone:</strong> ${r.phone}</div>
              ${r.notes ? `<div><strong>Notes:</strong> ${r.notes}</div>` : ''}
              <div style="color:#999;font-size:0.85rem;">Submitted: ${r.created_at}</div>
              <button class="btn-complete" onclick="toggleComplete(${r.id})">${r.completed ? 'Mark Pending' : 'Mark Complete'}</button>
            </div>
          </div>`)
        .join('')
        : '<div style="text-align:center;color:#999;padding:40px;">No requests yet!</div>';
      
      document.getElementById('requests-list').innerHTML = html;
    }

    refreshDasher();
  </script>
</body>
</html>
