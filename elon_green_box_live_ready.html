<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elon Green Box Live Ready</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.supabase.io/js/v2.0.0/supabase.min.js"></script>
</head>
<body>
    <header>
        <h1>Welcome to the Elon Green Box</h1>
        <div class="hero">
            <h2>Your green solution for a better planet</h2>
        </div>
    </header>
    <main>
        <form id="greenbox-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <button type="submit">Submit</button>
        </form>
        <div id="status"></div>
    </main>
    <script>
        const supabaseUrl = 'YOUR_SUPABASE_URL'; // replace with your Supabase URL
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY'; // replace with your Supabase Anonymous Key
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('greenbox-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            const { data, error } = await supabase
                .from('your_table')
                .insert([{ name, email }]);

            const statusDiv = document.getElementById('status');
            if (error) {
                statusDiv.innerHTML = `Error: ${error.message}`;
            } else {
                statusDiv.innerHTML = 'Success! Your response has been recorded.';
            }
        });
    </script>
</body>
</html>
